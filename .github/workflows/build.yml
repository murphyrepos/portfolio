name: Build

on:
  pull_request:
    branches:
      - main

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      CAL_NAMESPACE: ${{ vars.CAL_NAMESPACE || '' }}
      CAL_EMBED_JS_URL: ${{ vars.CAL_EMBED_JS_URL || '' }}
      CAL_ORIGIN: ${{ vars.CAL_ORIGIN || '' }}
      CAL_LINK: ${{ vars.CAL_LINK || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
